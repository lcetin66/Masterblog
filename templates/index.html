<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master-Blog </title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <header>
            <h1>Master-Blog</h1>
        </header>

        <div class="nav-actions">
            <a href="{{ url_for('add') }}" class="btn btn-primary">+ Create New Post</a>
        </div>

        <main class="post-list">
            {% for post in posts %}
            <article class="post">
                <div class="post-actions">
                    <a href="{{ url_for('update', post_id=post.id) }}" class="btn-edit">Edit</a>
                    <a href="{{ url_for('delete', post_id=post.id) }}" class="btn-delete">Delete</a>
                </div>
                <h2>{{ post.title }}</h2>
                <div class="meta">
                    <span class="author">By <strong>{{ post.author }}</strong></span>
                </div>
                <div class="content">
                    <p>{{ post.content }}</p>
                </div>
            </article>
            {% endfor %}
        </main>
    </div>
</body>

</html>
