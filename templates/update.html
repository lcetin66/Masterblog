<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Post | Master-Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <header>
            <h1>Update Post</h1>
        </header>

        <div class="card-form">
            <form action="{{ url_for('update', post_id=post.id) }}" method="POST">
                <div>
                    <label for="title">Post Title</label>
                    <input type="text" id="title" name="title" value="{{ post.title }}" required>
                </div>

                <div>
                    <label for="author">Author Name</label>
                    <input type="text" id="author" name="author" value="{{ post.author }}" required>
                </div>

                <div>
                    <label for="content">Story Content</label>
                    <textarea id="content" name="content" rows="6" required>{{ post.content }}</textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
