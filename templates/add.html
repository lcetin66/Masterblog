<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Post | Master-Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <header>
            <h1>Create Post</h1>
            <p class="subtitle">Share your thoughts with the world.</p>
        </header>

        <div class="card-form">
            <form action="{{ url_for('add') }}" method="POST">
                <div>
                    <label for="title">Post Title</label>
                    <input type="text" id="title" name="title" placeholder="Enter a catchy title..." required>
                </div>

                <div>
                    <label for="author">Author Name</label>
                    <input type="text" id="author" name="author" placeholder="Your name" required>
                </div>

                <div>
                    <label for="content">Story Content</label>
                    <textarea id="content" name="content" rows="6" placeholder="What's on your mind?" required></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Publish Story</button>
                    <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
